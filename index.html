<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>礼泉翻鸡计分器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-bar">
        <div class="logo">
          <img src="logo.png?v=2" alt="一条" class="logo-icon">
          <div class="logo-copy">
            <h1>礼泉翻鸡计分器</h1>
            <p class="app-tagline">牌桌边就能快速记一局，算得清，也看得清</p>
            <div class="table-legend" aria-hidden="true">
              <span>东</span>
              <span>南</span>
              <span>西</span>
              <span>北</span>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="app-main">
      <section id="session-setup" class="panel setup-panel">
        <div class="panel-title-row">
          <h2>新建对局</h2>
          <span class="panel-badge">起局</span>
        </div>
        <form id="new-session-form">
          <div class="form-row">
            <label>人数</label>
            <select name="playerCount" id="player-count">
              <option value="4">4 人</option>
              <option value="5">5 人</option>
              <option value="6">6 人</option>
              <option value="7">7 人</option>
              <option value="8">8 人</option>
            </select>
          </div>
          <div class="form-row">
            <label>初始积分</label>
            <input type="number" name="initialScore" class="setup-input" value="20" min="1" max="999">
          </div>
          <div class="player-inputs" id="player-inputs"></div>
          <button type="submit" class="btn-primary">开始</button>
        </form>
      </section>

      <section id="game-panel" class="hidden">
        <div class="summary-float">
          <div id="round-summary" class="round-summary floating-summary"></div>
        </div>

        <div class="scoreboard-panel">
          <div class="scoreboard-header">
            <div>
              <h2>当前积分</h2>
              <p id="scoreboard-subtitle" class="scoreboard-subtitle">新大局已开始</p>
            </div>
            <button type="button" id="new-session-btn" class="btn-ghost">新对局</button>
          </div>
          <div class="scoreboard-summary-row">
            <button type="button" id="scoreboard-toggle-btn" class="btn-ghost btn-sm">展开积分</button>
          </div>
          <div id="scoreboard-details" class="hidden">
            <div id="total-scores" class="score-grid"></div>
          </div>
        </div>

        <div class="round-entry panel">
          <div class="panel-title-row">
            <h2>本局录入</h2>
            <span class="panel-badge">记分</span>
          </div>
          <div id="table-players-row" class="form-group table-players-row hidden">
            <label>上场座位</label>
            <div id="table-player-seats" class="seat-grid"></div>
          </div>
          <div class="round-type-tabs">
            <button type="button" data-type="win" class="tab active">胡牌</button>
            <button type="button" data-type="liuju" class="tab">流局</button>
          </div>

          <form id="win-form" class="round-form">
            <input type="hidden" name="type" value="win">
            <div class="form-section">
              <div class="section-title">胜负信息</div>
              <div class="form-group">
                <label>自摸 / 点炮</label>
                <div class="win-type-tabs">
                  <button type="button" class="tab active" data-wintype="zimo">自摸</button>
                  <button type="button" class="tab" data-wintype="dianpao">点炮</button>
                </div>
                <input type="hidden" name="winType" value="zimo">
              </div>
              <div class="form-group">
                <label>胡牌者（点炮可多选）</label>
                <div id="winner-checkboxes" class="checkbox-group player-chip-group"></div>
              </div>
              <div class="form-row dianpao-only hidden">
                <label>点炮者</label>
                <select name="feeder"></select>
              </div>
              <div class="form-group" id="fan-group">
                <label>番型</label>
                <div id="fan-select-container"></div>
              </div>
            </div>

            <details class="advanced-section" open>
              <summary>进阶项</summary>
              <div class="advanced-content">
                <div class="form-group">
                  <label>天缺（无天缺不勾选）</label>
                  <div id="tianque-checkboxes" class="checkbox-group player-chip-group"></div>
                </div>
                <div class="form-group penalty-section">
                  <label>是否查缺</label>
                  <div class="penalty-tabs" id="penalty-mode-tabs">
                    <button type="button" class="tab" data-penalty="yes" id="penalty-yes">是</button>
                    <button type="button" class="tab active" data-penalty="no" id="penalty-no">否</button>
                  </div>
                  <input type="hidden" name="penaltyMode" value="no">
                </div>
                <div class="form-group penalty-row hidden">
                  <label class="penalty-sublabel">每人缺门张数（非胡牌者）</label>
                  <div id="penalty-inputs" class="chicken-grid"></div>
                </div>
                <div class="form-group chicken-section">
                  <label>是否鸡牌</label>
                  <div class="penalty-tabs" id="chicken-presence-tabs">
                    <button type="button" class="tab" data-chicken-enabled="yes">是</button>
                    <button type="button" class="tab active" data-chicken-enabled="no">否</button>
                  </div>
                  <input type="hidden" name="chickenEnabled" value="no">
                </div>
                <div class="form-group chicken-mode-row hidden">
                  <label>是否金鸡</label>
                  <div class="chicken-mode-tabs">
                    <button type="button" class="tab active" data-chicken="no">否（1分/鸡）</button>
                    <button type="button" class="tab" data-chicken="yes">是（金鸡×2）</button>
                  </div>
                  <input type="hidden" name="chickenMode" value="no">
                </div>
                <div class="form-group chicken-count-row hidden">
                  <label class="penalty-sublabel">每人鸡牌数</label>
                  <div id="chicken-inputs" class="chicken-grid compact-grid"></div>
                </div>
                <div class="form-group kong-section">
                  <label>杠牌（可多选）</label>
                  <div id="kong-list" class="kong-list"></div>
                  <button type="button" id="add-kong-btn" class="btn-ghost btn-sm">+ 添加杠牌</button>
                </div>
                <div class="form-group special-section">
                  <label>特殊结算（可多选）</label>
                  <div id="special-list" class="special-list"></div>
                  <button type="button" id="add-special-btn" class="btn-ghost btn-sm">+ 添加特殊结算</button>
                </div>
              </div>
            </details>
            <button type="submit" class="btn-primary">结算</button>
          </form>

          <form id="liuju-form" class="round-form hidden">
            <input type="hidden" name="type" value="liuju">
            <div class="form-section">
              <div class="section-title">流局信息</div>
              <div class="form-group">
                <label>听牌者</label>
                <div id="liuju-ting-checkboxes" class="checkbox-group player-chip-group"></div>
              </div>
            </div>
            <details class="advanced-section">
              <summary>杠牌补充</summary>
              <div class="advanced-content">
                <div class="form-group kong-section">
                  <label>杠牌（可多选）</label>
                  <div id="liuju-kong-list" class="kong-list"></div>
                  <button type="button" id="add-liuju-kong-btn" class="btn-ghost btn-sm">+ 添加杠牌</button>
                </div>
                <div class="form-group special-section">
                  <label>特殊结算（可多选）</label>
                  <div id="liuju-special-list" class="special-list"></div>
                  <button type="button" id="add-liuju-special-btn" class="btn-ghost btn-sm">+ 添加特殊结算</button>
                </div>
              </div>
            </details>
            <button type="submit" class="btn-primary">结算</button>
          </form>
        </div>

        <div class="round-result panel hidden">
          <div class="panel-title-row">
            <h2>本局得分</h2>
            <span class="panel-badge">结果</span>
          </div>
          <div id="round-scores" class="score-grid"></div>
          <div id="round-detail" class="round-detail"></div>
          <button type="button" id="next-round" class="btn-primary">下一局</button>
        </div>

        <div class="history-panel panel">
          <div class="history-header">
            <div>
              <div class="panel-title-row">
                <h2>历史记录</h2>
                <span class="panel-badge">牌谱</span>
              </div>
              <p class="history-subtitle">最近结算会显示核心分数变化</p>
            </div>
            <button type="button" id="undo-round-btn" class="btn-ghost btn-danger">撤销上一局</button>
          </div>
          <div id="history-list" class="history-list"></div>
        </div>
      </section>
    </main>

    <div id="game-over-overlay" class="overlay hidden">
      <div class="modal game-over-modal">
        <h2>大局结算</h2>
        <p class="game-over-desc">有人积分小于等于 0，本大局结束</p>
        <div id="game-over-scores" class="score-grid"></div>
        <div id="game-over-detail" class="round-detail"></div>
        <button type="button" id="game-over-confirm" class="btn-primary">开始新大局</button>
      </div>
    </div>

    <div id="history-detail-overlay" class="overlay hidden">
      <div class="modal history-detail-modal">
        <div class="modal-header">
          <h2 id="history-detail-title">局详情</h2>
          <button type="button" id="history-detail-close" class="btn-close">×</button>
        </div>
        <div id="history-detail-content" class="round-detail"></div>
        <button type="button" id="history-detail-next" class="btn-primary hidden">下一局</button>
      </div>
    </div>
  </div>
  <script src="scorekeeper.js"></script>
</body>
</html>
