<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>礼泉翻鸡计分器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="logo">
        <img src="logo.png" alt="一条" class="logo-icon">
        <h1>礼泉翻鸡计分器</h1>
      </div>
    </header>

    <main class="app-main">
      <section id="session-setup" class="panel setup-panel">
        <h2>新建对局</h2>
        <form id="new-session-form">
          <div class="form-row">
            <label>初始积分</label>
            <input type="number" name="initialScore" class="setup-input" value="20" min="1" max="999">
          </div>
          <div class="player-inputs" id="player-inputs">
            <label>玩家 1 <input type="text" name="p0" class="player-name-input" placeholder="昵称" required></label>
            <label>玩家 2 <input type="text" name="p1" class="player-name-input" placeholder="昵称" required></label>
            <label>玩家 3 <input type="text" name="p2" class="player-name-input" placeholder="昵称" required></label>
            <label>玩家 4 <input type="text" name="p3" class="player-name-input" placeholder="昵称" required></label>
          </div>
          <button type="submit" class="btn-primary">开始</button>
        </form>
      </section>

      <section id="game-panel" class="hidden">
        <div class="scoreboard-panel">
          <div class="scoreboard-header">
            <h2>当前积分</h2>
            <button type="button" id="new-session-btn" class="btn-ghost">新对局</button>
          </div>
          <div id="total-scores" class="score-grid"></div>
        </div>

        <div class="round-entry panel">
          <h2>本局录入</h2>
          <div class="round-type-tabs">
            <button type="button" data-type="win" class="tab active">胡牌</button>
            <button type="button" data-type="liuju" class="tab">流局</button>
          </div>

          <form id="win-form" class="round-form">
            <input type="hidden" name="type" value="win">
            <div class="form-group">
              <label>天缺（无天缺不勾选）</label>
              <div id="tianque-checkboxes" class="checkbox-group"></div>
            </div>
            <div class="form-group">
              <label>自摸 / 点炮</label>
              <div class="win-type-tabs">
                <button type="button" class="tab" data-wintype="zimo">自摸</button>
                <button type="button" class="tab" data-wintype="dianpao">点炮</button>
              </div>
              <input type="hidden" name="winType" value="zimo">
            </div>
            <div class="form-group">
              <label>胡牌者（点炮可多选）</label>
              <div id="winner-checkboxes" class="checkbox-group"></div>
            </div>
            <div class="form-row dianpao-only hidden">
              <label>点炮者</label>
              <select name="feeder"></select>
            </div>
            <div class="form-group" id="fan-group">
              <label>番型</label>
              <div id="fan-select-container"></div>
            </div>
            <div class="form-group penalty-section">
              <label>是否查缺</label>
              <div class="penalty-tabs">
                <button type="button" class="tab" data-penalty="yes" id="penalty-yes">是</button>
                <button type="button" class="tab active" data-penalty="no" id="penalty-no">否</button>
              </div>
              <input type="hidden" name="penaltyMode" value="no">
            </div>
            <div class="form-group penalty-row hidden">
              <label class="penalty-sublabel">每人缺门张数（非胡牌者）</label>
              <div id="penalty-inputs" class="chicken-grid"></div>
            </div>
            <div class="form-row">
              <label>翻出牌（+1为鸡牌）</label>
              <select name="flippedCard"></select>
            </div>
            <div class="form-group">
              <label>听牌者（含胡牌者）</label>
              <div id="ting-checkboxes" class="checkbox-group"></div>
            </div>
            <div class="form-group chicken-group hidden">
              <label>每人鸡牌数（仅听牌者填）</label>
              <div id="chicken-inputs" class="chicken-grid"></div>
            </div>
            <button type="submit" class="btn-primary">结算</button>
          </form>

          <form id="liuju-form" class="round-form hidden">
            <input type="hidden" name="type" value="liuju">
            <div class="form-group">
              <label>听牌者</label>
              <div id="liuju-ting-checkboxes" class="checkbox-group"></div>
            </div>
            <button type="submit" class="btn-primary">结算</button>
          </form>
        </div>

        <div class="round-result panel hidden">
          <h2>本局得分</h2>
          <div id="round-scores" class="score-grid"></div>
          <div id="round-detail" class="round-detail"></div>
          <button type="button" id="next-round" class="btn-primary">下一局</button>
        </div>

        <div class="history-panel panel">
          <h2>历史记录</h2>
          <div id="history-list" class="history-list"></div>
        </div>
      </section>
    </main>

    <div id="game-over-overlay" class="overlay hidden">
      <div class="modal game-over-modal">
        <h2>大局结算</h2>
        <p class="game-over-desc">有人积分 ≤ 0，本大局结束</p>
        <div id="game-over-scores" class="score-grid"></div>
        <div id="game-over-detail" class="round-detail"></div>
        <button type="button" id="game-over-confirm" class="btn-primary">开始新大局</button>
      </div>
    </div>

    <div id="history-detail-overlay" class="overlay hidden">
      <div class="modal history-detail-modal">
        <div class="modal-header">
          <h2 id="history-detail-title">局详情</h2>
          <button type="button" id="history-detail-close" class="btn-close">×</button>
        </div>
        <div id="history-detail-content" class="round-detail"></div>
      </div>
    </div>
  </div>
  <script src="scorekeeper.js"></script>
</body>
</html>
